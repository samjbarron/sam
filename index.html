<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Your Name</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">

  <style>

    body {

      margin: 0;

      background-color: #f6dce6;

      color: #fff4dc;

      font-family: 'Cormorant Garamond', serif;

      border-left: 18px double #b8d7ee;

      border-right: 18px double #b8d7ee;

      min-height: 100vh;

      background-image:
      radial-gradient(circle at top left, rgba(255,255,255,0.15), transparent 30%),
      radial-gradient(circle at bottom right, rgba(255,255,255,0.1), transparent 30%);

    }

    header {

      position: relative;

      text-align: center;

      padding-top: 45px;

      padding-bottom: 25px;

    }

    h1 {

      font-family: 'Great Vibes', cursive;

      font-size: 100px;

      font-weight: normal;

      color: #fff4dc;

      margin: 0;

      letter-spacing: 2px;

      text-shadow: 2px 2px 10px rgba(0,0,0,0.15);

    }

    .corner-img {

      position: absolute;

      top: 30px;

      width: 145px;

      height: 185px;

      object-fit: cover;

      border: 3px solid #fff4dc;

      border-radius: 14px;

      box-shadow: 0px 0px 18px rgba(255,255,255,0.3);

    }

    .left {

      left: 40px;

    }

    .right {

      right: 40px;

    }

    nav {

      text-align: center;

      margin-top: 15px;

      margin-bottom: 45px;

    }

    nav a {

      font-family: 'Great Vibes', cursive;

      font-size: 40px;

      color: #fff4dc;

      text-decoration: none;

      margin-left: 22px;

      margin-right: 22px;

      transition: 0.3s;

    }

    nav a:hover {

      color: #b8d7ee;

      text-shadow: 0px 0px 10px rgba(255,255,255,0.8);

    }

    #homepage-box {

      width: 68%;

      margin: auto;

      padding: 40px;

      background-color: rgba(184, 215, 238, 0.20);

      border: 2px solid #fff4dc;

      border-radius: 22px;

      text-align: center;

      box-shadow: 0px 0px 20px rgba(255,255,255,0.18);

    }

    #homepage-box h2 {

      font-family: 'Great Vibes', cursive;

      font-size: 60px;

      margin-top: 0;

      margin-bottom: 15px;

      color: #fff4dc;

    }

    #homepage-box p {

      font-size: 26px;

      line-height: 1.7;

      color: #fff4dc;

      margin-bottom: 0;

    }

    footer {

      text-align: center;

      margin-top: 55px;

      margin-bottom: 18px;

      font-family: 'Great Vibes', cursive;

      font-size: 65px;

      color: #fff4dc;

    }

  </style>

</head>

<body>

  <header>

    <img class="corner-img left" src="leftimage.jpg" alt="Decorative image">

    <h1>Your Name</h1>

    <img class="corner-img right" src="rightimage.jpg" alt="Decorative image">

  </header>

  <nav>

    <a href="index.html">Home</a>

    <a href="pictures.html">Pictures</a>

    <a href="drawings.html">Drawings/Paintings</a>

    <a href="animations.html">Animations</a>

    <a href="about.html">About Me</a>

  </nav>

  <main id="homepage-box">

    <h2>Welcome</h2>

    <p>
      Enter my little theater of artwork, photography, animation, and memory.
      A dreamy archive of images, sketches, movement, softness, and stories.
    </p>

  </main>

  <footer>

    ❦

  </footer>

</body>

</html>
